project:
  name: asistente_personal
  version: v2.1
  status: active
  methodology: W-CVC
  timezone: America/Montevideo
  architecture: multiagent_langgraph

current_state:
  current_phase: FASE_1A
  current_task: T-001
  go_condition:
    - docs/PRD_PROYECTO_ACTIVO.md commiteado
    - CLAUDE.md commiteado
    - WORKPLAN.yaml commiteado
    - .env.example commiteado

status_legend:
  ready:       "Puede ejecutarse ahora"
  blocked:     "Tiene dependencias pendientes"
  in_progress: "Se está ejecutando"
  done:        "Terminada y verificada"

phases:
  - id: FASE_1A
    name: Base operativa container-first
    gate: >
      docker compose up levanta,
      GET /health responde 200 desde host en http://localhost:8000/health,
      config carga todos los LLMs y variables,
      pytest smoke pasa dentro del contenedor

  - id: FASE_1B
    name: Grafo base y contratos de dominio
    gate: >
      AgentState definido,
      grafo LangGraph compila con nodos placeholder,
      SqliteSaver conectado,
      dominio (intents, schemas, confirmation) commiteado

  - id: FASE_2
    name: Orquestador y confirmación
    gate: >
      orchestrator clasifica y rutea correctamente en español,
      confirmation_node gestiona confirmed/rejected/expired,
      LLM factory operativo

  - id: FASE_3
    name: Agentes especializados y conectores reales
    gate: >
      los 4 agentes leen y escriben en sus fuentes reales,
      confirmación previa funcionando en cada dominio

  - id: FASE_4
    name: WhatsApp e idempotencia
    gate: >
      webhook recibe mensaje Twilio,
      dedupe check funciona,
      grafo procesa el mensaje,
      el dato se persiste exactamente una vez

  - id: FASE_5
    name: Reporting y consultas complejas
    gate: >
      reporting_agent responde consultas cruzadas correctamente,
      nunca persiste

  - id: FASE_6
    name: Scheduler y recordatorios
    gate: >
      recordatorios salen a horario en America/Montevideo,
      missed funciona correctamente

  - id: FASE_7
    name: Validación y deploy
    gate: >
      todos los Acceptance Criteria verificados,
      deploy en Railway o Render operativo

